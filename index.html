<!doctype html>
<html ng-app="taskFlow">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="src/assets/favicon.svg" />
  <title>TaskFlow</title>

  <!-- AngularJS -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="src/css/style.css" />
</head>

<body  ng-cloak>
  <!-- Header -->
  <header>
    <div class="logo-name-container">
      <div class="logo" onclick="location.reload()">
        <img src="./src/assets/logo.png" alt="logo" />
      </div>
      <div class="name">Task<span class="accent">Flow</span></div>
    </div>

    <!-- Theme Button -->
    <div class="theme-button" ng-controller="themeController" ng-click="toggleTheme()">
      <img src="./src/assets/light.svg" ng-show="!isLight" />
      <img src="./src/assets/dark.svg" ng-show="isLight" />
    </div>
  </header>

  <main>
    <!-- Popup Controller -->
    <div ng-controller="popupController"  ng-cloak>
      <!-- Add Task Button -->
      <div class="input-container">
        <button class="add-task-button" ng-click="toggleForm()">
          <i class="fa-solid fa-plus"></i> Add Task
        </button>
      </div>

      <!-- Popup -->
      <div class="popup-wrapper" ng-show="isVisible">
        <form name="taskForm" novalidate class="popup-container">
          <div class="popup-title">Add Task</div>

          <input type="text" placeholder="Add a new task..." class="task-input" maxlength="35" ng-model="task.title"
            name="title" ng-change="capitalizeFirstLetter()" required />
          <span class="error"
            ng-show="(taskForm.title.$touched || taskForm.$submitted) && taskForm.title.$error.required">
            Task name is required
          </span>

          <input id="taskDate" type="date" class="date-input" ng-model="task.date" name="date" required
            min="{{today}}" />
          <span class="error"
            ng-show="(taskForm.date.$touched || taskForm.$submitted) && taskForm.date.$error.required">
            Date is required
          </span>

          <div class="control-buttons">
            <button type="button" class="add-task-button" ng-click="submitTask()" ng-disabled="taskForm.$invalid">
              Add
            </button>
            <button type="button" class="add-task-button" ng-click="closeForm()">
              Cancel
            </button>
        </form>
      </div>
    </div>
    </div>

    <!-- card contianer  -->
    <div class="card-container" ng-controller="cardController">
      <div class="no-tasks" ng-if="!tasks || tasks.length === 0">
        <p>No tasks yet. Click "Add Task" to get started.</p>
      </div>

      <div class="card" ng-repeat="task in tasks track by $index">
        <div class="card-pin">
          <img src="./src/assets/pin.svg" alt="pin" ng-class="{
      'pin-urgent': task.priority == 'Urgent',
      'pin-upcoming': task.priority == 'Upcoming',
      'pin-later': task.priority == 'Later'
    }" />
        </div>

        <div class="content-wrapper">
          <div class="title">{{task.title}}</div>
          <input type="checkbox" ng-model="task.completed" ng-change="completeTask(task)" />
        </div>

        <div class="content-wrapper">
          <div class="date">{{task.date | date:'dd/MM/yyyy'}}</div>

          <div class="priority">
            {{task.priority}}<span class="priority-label" ng-class="{
            'urgent': task.priority == 'Urgent',
            'later': task.priority == 'Later',
            'upcoming': task.priority == 'Upcoming',
          }"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Social links  -->
  <footer>
    <div class="social-links">
      <a href="https://www.linkedin.com/in/rohan-korake-720848342/" target="_blank">
        <i class="fab fa-linkedin"></i>
      </a>
      <a href="https://github.com/Rohan-Korake" target="_blank">
        <i class="fab fa-github"></i>
      </a>
      <a href="mailto:rohannkorake@gmail.com" target="_blank">
        <i class="fas fa-envelope"></i> </a>
    </div>
  </footer>

  <!-- Main JS -->
  <script type="module" src="src/js/main.js"></script>
</body>

</html>
