<!doctype html>
<html ng-app="taskFlow">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="src/assets/favicon.svg" />
    <title>TaskFlow</title>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="src/css/style.css" />
  </head>

  <body>
    <!-- Header section  -->
    <header>
      <div class="logo-name-container">
        <div class="logo" onclick="location.reload()">
          <img src="./src/assets/logo.png" alt="logo" />
        </div>
        <div class="name">Task<span class="accent">Flow</span></div>
      </div>

      <!-- Theme Button -->
      <div
        class="theme-button"
        ng-click="toggleTheme()"
        ng-controller="themeController"
      >
        <!-- Show when dark -->
        <img src="./src/assets/light.svg" alt="light" ng-show="!isLight" />

        <!-- Show when light -->
        <img src="./src/assets/dark.svg" alt="dark" ng-show="isLight" />
      </div>
    </header>

    <main>
      <!-- add new task  -->
      <div class="input-container">
        <div class="input-component">
          <!-- <input type="text" placeholder="Add a new task..." /> -->
          <button class="add-task-button" ng-click="isVisible = !isVisible">
            <i class="fa-solid fa-plus"></i> Add Task
          </button>
        </div>
      </div>

      <!-- add new task popup  -->
      <div class="popup-wrapper" ng-show="isVisible">
        <div class="popup-container">
          <div class="popup-title">Add Task</div>
          <input
            type="text"
            placeholder="Add a new task..."
            class="task-input"
          />
          <input type="date" class="date-input" id="taskDate" />
          <select class="priority-input">
            <option value="">Select Priority</option>
            <option>High</option>
            <option>Medium</option>
            <option>Low</option>
          </select>
          <div class="control-buttons">
            <button class="add-task-button" ng-click="isVisible = !isVisible">
              Add
            </button>
            <button class="add-task-button" ng-click="isVisible = !isVisible">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
